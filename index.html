<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonlit Mess</title>

  <link rel="stylesheet" href="style.css" />

  <meta name="theme-color" content="#06081a" />
</head>

<body>

  <div id="app">

    <!-- SKY CANVAS -->
    <canvas id="sky" aria-hidden="true"></canvas>

    <!-- ✨ STAR LAYER -->
    <div class="stars" aria-hidden="true"></div>

    <!-- 🌊 WATER REFLECTION -->
    <div class="water-reflection" aria-hidden="true"></div>

    <div class="vignette" aria-hidden="true"></div>

    <!-- MUSIC -->
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()" aria-label="Toggle ambient music">
      ♫ music
    </button>

    <main>
      <h1 class="sr-only">Moonlit Mess</h1>

      <div class="z">

        <div class="moon-orb" aria-hidden="true"></div>
        <div class="site-name" aria-hidden="true">Moonlit Mess</div>

        <!-- HOME -->
        <div class="screen" id="s0">

          <div class="home-copy">
            <p class="home-quiet">it's quiet here</p>
            <p class="home-carry">you can leave what you're carrying</p>

            <button class="home-primary" onclick="goTo('s-gate')">
              write it. leave it.
            </button>

            <button class="home-secondary" onclick="goTo('s-find')">
              find your light in the dark
            </button>
          </div>

        </div>

        <!-- GATE -->
        <div class="screen hidden" id="s-gate">
          <p class="inter-msg">Some thoughts need a place to go.<br>Leave yours here.</p>
          <div class="btn-row">
            <button class="btn-moon ghost" onclick="goTo('s0')">go back</button>
            <button class="btn-moon" onclick="goTo('s-write')">continue</button>
          </div>
        </div>

        <!-- WRITE -->
        <div class="screen hidden" id="s-write">
          <p class="inter-msg">Write freely. No one will see this.</p>

          <textarea id="thought-input" placeholder="write freely..."></textarea>

          <div class="btn-row">
            <button class="btn-moon ghost" onclick="goTo('s-gate')">go back</button>
            <button class="btn-moon" onclick="goTo('s-reflect')">continue</button>
          </div>
        </div>

        <!-- REFLECT -->
        <div class="screen hidden" id="s-reflect">
          <div class="reflect-wrap">
            <div class="typed-thought"></div>
            <div class="reflect-q">What are you holding onto?</div>

            <textarea id="reflect-response"></textarea>

            <div class="btn-row">
              <button class="btn-moon ghost" onclick="goTo('s-stay')">let it stay</button>
              <button class="btn-moon" onclick="goTo('s-lantern')">let it go</button>
            </div>
          </div>
        </div>

        <!-- LANTERN -->
        <div class="screen hidden" id="s-lantern">
          <canvas id="lc"></canvas>
        </div>

        <!-- FIND -->
        <div class="screen hidden" id="s-find">
          <div class="light-sub">someone left this for you</div>
          <div class="light-msg-box">you are still becoming</div>

          <div class="btn-row">
            <button class="btn-moon ghost" onclick="goTo('s0')">go back</button>
            <button class="btn-moon" onclick="nextLight()">next</button>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- SCRIPTS -->
  <script src="sky.js"></script>
  <script src="music.js"></script>
  <script src="lantern.js"></script>
  <script src="app.js"></script>

</body>
</html>
