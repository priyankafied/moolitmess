<!-- HOME -->
<div class="screen" id="s0" role="region" aria-label="Home">
  <p class="hero-text">
    This space doesn't remember you.<br><br>

    What you write here stays with you.<br>
    Only what you choose to leave is shared.<br><br>

    <em>It's just you, tonight, and what you're carrying.</em>
  </p>

  <div class="btn-row">
    <div class="btn-wrap">
      <button class="btn-moon" onclick="goTo('s-gate')" id="btn-leave-it">leave it</button>
      <span class="btn-hint">write and release a thought</span>
    </div>

    <div class="btn-wrap">
      <button class="btn-moon ghost" onclick="goTo('s-find')" id="btn-find-light">find a light</button>
      <span class="btn-hint">read something someone left</span>
    </div>
  </div>
</div>
